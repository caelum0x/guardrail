name: volatility-targeted-risk-parity-bsc
version: 1.0.0
track: "Track 2 — Strategy Skills"
description: >
  A CMC Skill that sizes positions by INVERSE VOLATILITY / RISK PARITY so each
  holding contributes roughly equal risk to the book, then scales gross exposure
  to hit a TARGET PORTFOLIO VOLATILITY over 20 eligible BSC tokens. This is a
  NEW axis relative to the four sibling Skills: where they decide WHAT to buy
  (signal direction — alpha blend, carry, reversion, breakout), this Skill
  decides HOW MUCH of each to hold (risk-based sizing). Eligibility is signal-
  light (liquid, security-clean, non-stable names with a usable realised-vol
  reading); the distinguishing layer is the allocator: weight_i ∝ 1/vol_i
  (mirroring crates/portfolio-optimizer::inverse_volatility / risk_parity_lite),
  capped at the per-name 17%, scaled by a target-vol / regime exposure
  multiplier, with the USDT reserve as the remainder. It DE-RISKS in risk_off
  (rising realised vol -> the target-vol scalar shrinks gross). It respects the
  same risk envelope (per-name cap, stable reserve, drawdown gates) as its
  siblings. It is a strategy specification, not an executor — the Rust risk
  engine is the final authority over every trade.
spec: strategy_spec.yaml
inputs:
  - cmc_quotes            # price, % change 1h/24h/7d, market cap, 24h volume
  - cmc_ohlcv             # hourly candles -> realised volatility + ATR (crates/indicators)
  - realised_vol          # trailing realised volatility per asset -> the inverse-vol weight driver
  - atr_14                # 14-period Wilder ATR -> volatility proxy + protective stops (crates/indicators)
  - cmc_fear_greed        # market-wide sentiment (0..100)
  - cmc_dex_liquidity     # on-chain depth -> liquidity + execution quality
  - cmc_token_security    # safety score + flags -> security penalty / eligibility
  - cmc_global            # total market cap, BTC dominance
  - eligible_asset_list   # the 20 BSC tokens (configs/eligible_assets.bsc.json)
outputs:
  - market_regime         # risk_on | risk_off | chop | breakout
  - risk_weights          # per-asset realised_vol, inv_vol, raw_parity_weight, capped weight
  - target_portfolio      # weights summing to <=100, USDT reserve remainder
  - actions               # entry | exit | rebalance | trim | heartbeat
  - entry_rules
  - exit_rules
  - risk_policy
regimes:
  - risk_on
  - risk_off
  - chop
  - breakout
examples:
  - examples/risk_on_example.json
  - examples/risk_off_example.json
  - examples/chop_example.json
  - examples/breakout_example.json
prompts:
  - prompts/system.md
  - prompts/strategy_generation.md
  - prompts/backtest_spec.md
