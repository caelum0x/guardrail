global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: guardrail-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: guardrail-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["exporter:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
