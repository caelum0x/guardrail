apiVersion: v1
kind: Service
metadata:
  name: guardrail-api
  namespace: guardrail
  labels:
    app.kubernetes.io/name: guardrail-api
spec:
  selector:
    app.kubernetes.io/name: guardrail-core
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: v1
kind: Service
metadata:
  name: guardrail-exporter
  namespace: guardrail
  labels:
    app.kubernetes.io/name: guardrail-exporter
spec:
  selector:
    app.kubernetes.io/name: guardrail-core
  ports:
    - { name: metrics, port: 9100, targetPort: 9100 }
