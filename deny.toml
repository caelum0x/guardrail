[advisories]
ignore = []

[licenses]
# Permissive licenses used across the dependency tree (and this workspace's own
# MIT license). Without an explicit allow-list, cargo-deny rejects every crate.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "0BSD",
]
confidence-threshold = 0.8
