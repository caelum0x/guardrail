name: Dashboard CI

on:
  push:
  pull_request:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install
        working-directory: dashboard
      - run: pnpm exec tsc --noEmit
        working-directory: dashboard
